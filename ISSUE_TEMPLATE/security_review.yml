name: Security issue
description: Track a security-sensitive issue or review item
title: "[Security] "
labels: ["type:security"]
body:
  - type: textarea
    id: impacted_surface
    attributes:
      label: Impacted surface
      description: Repo, package, service, environment, workflow, or control affected
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: finding
    attributes:
      label: Finding or reproduction
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Temporary mitigation

  - type: textarea
    id: reviewers
    attributes:
      label: Required reviewers or teams
