name: Feature request
description: Propose a product, platform, demo, workflow, or infrastructure feature
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: user_workflow
    attributes:
      label: User or system workflow
      description: Which operator, engineer, system, or pilot workflow is affected?
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: Describe the intended system behavior.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the concrete conditions for completion.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List upstream teams, schemas, services, infra, or documents this depends on.

  - type: input
    id: release_target
    attributes:
      label: Release target
      placeholder: Sprint 0 / Phase 1 / Demo Week 4 / etc.
