name: Bug report
description: Report a bug or broken behavior
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: local / dev / staging / pilot-port / pilot-energy

  - type: textarea
    id: logs
    attributes:
      label: Logs, traces, screenshots, or links
